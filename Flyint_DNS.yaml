[custom]

; ====== DNS 配置（已加入 bestvmr 专用 DNS） ======
; Clash Meta / Premium 兼容
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  default-nameserver:
    - 223.5.5.5
    - 1.1.1.1
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://1.1.1.1/dns-query
  nameserver-policy:
    "*.bestvmr.com": "47.110.75.65:8053"

