# 基础切换 (加双引号防止正则解析错误)
🚀 手动切换 = select, policy-path={{url}}, update-interval=3600, policy-regex-filter="^((?!直连).)*$", icon-url=https://raw.githubusercontent.com/Koolson/Qure/master/IconSet/Color/Static.png
