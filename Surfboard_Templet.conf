#!include=你的订阅链接

[General]
http-port = 7890
socks-port = 7891
redir-port = 7892
allow-lan = true
unified-delay = true
ipv6 = false
external-controller = 0.0.0.0:9090
global-ua = surfboard
address = /manual-fake-ip-range/198.18.0.1/16
sniff-tls = true

[DNS]
# DNS 启用配置
enable = true
ipv6 = false
listen = 0.0.0.0:1053

# 默认 DNS，用于解析加密 DNS 的域名
default-nameserver = 223.5.5.5, 119.29.29.29

# 主 DNS：采用机场推荐的 IP 格式 DoH
nameserver = https://119.29.29.29/dns-query, https://223.5.5.5/dns-query, 223.5.5.5

# 核心 Fake-IP 过滤：将机场域名强制排除，防止死锁
fake-ip-filter = *.jytergdf.org, blog.jytergdf.org, doh.pub, dns.alidns.com, dns.google, *.lan, *.local, +.stun.*.*, +.stun.*.*.*, +.msftncsi.com, +.msftconnecttest.com, +.push.apple.com, Mijia Cloud, dlg.io.mi.com, +.apple.com

[Proxy]
🟢 直连 = direct, udp-relay=true

