# 基础配置
port: 7890
socks-port: 7891
allow-interface-control: false
external-controller: 127.0.0.1:9090
mode: rule
log-level: info
ipv6: false

# 节点提供者（由脚本自动注入）
proxy-providers:
  Flyint:
    type: inline
    proxies: []

# 策略组逻辑
proxy-groups:
  - name: "🚀 节点选择"
    type: select
    proxies: [自动选择, DIRECT, 🇭🇰 香港节点, 🇹🇼 台湾节点, 🇯🇵 日本节点, 🇺🇸 美国节点, 🚀 手动切换]

  - name: "自动选择"
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use: [Flyint]

  - name: "🚀 手动切换"
    type: select
    use: [Flyint]

  # 地区分流（必须保留，否则 Rules 会报错）
  - name: "🇭🇰 香港节点"
    type: select
    use: [Flyint]
    filter: "(?i)香港|HK|Hong"

  - name: "🇹🇼 台湾节点"
    type: select
    use: [Flyint]
    filter: "(?i)台湾|TW|Taiwan"

  - name: "🇯🇵 日本节点"
    type: select
    use: [Flyint]
    filter: "(?i)日本|JP|Japan"

  - name: "🇺🇸 美国节点"
    type: select
    use: [Flyint]
    filter: "(?i)美国|US|States"

  # 示例业务组（根据你的 Flyint.txt 补全）
  - name: "🎬 奈飞视频"
    type: select
    proxies: [🚀 节点选择, 🇭🇰 香港节点, 🇹🇼 台湾节点, DIRECT]

# 规则部分（接你原来的 Rules）
rules:
  - RULE-SET,Netflix,🎬 奈飞视频
  - MATCH,🚀 节点选择
